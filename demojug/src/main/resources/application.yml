spring:
  application:
    name: Demo Coruña JUG
    version: @project.version@
  datasource:
    url: jdbc:h2:mem:demo-coruna-jug;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
